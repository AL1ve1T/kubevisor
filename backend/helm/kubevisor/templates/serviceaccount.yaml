{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubevisor.serviceAccountName" . }}
  namespace: {{ include "kubevisor.namespace" . }}
  labels:
    app: {{ include "kubevisor.backend.fullname" . }}
    app.kubernetes.io/name: {{ include "kubevisor.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
    {{- include "kubevisor.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.rbac.create }}
---
# The backend lists pods cluster-wide to read pod status, restart counts, and
# pod IPs (PodStatusScraper / KubernetesPodWatcher).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubevisor.backend.fullname" . }}-pod-reader
  labels:
    app.kubernetes.io/name: {{ include "kubevisor.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
    {{- include "kubevisor.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubevisor.backend.fullname" . }}-pod-reader
  labels:
    app.kubernetes.io/name: {{ include "kubevisor.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
    {{- include "kubevisor.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubevisor.serviceAccountName" . }}
    namespace: {{ include "kubevisor.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubevisor.backend.fullname" . }}-pod-reader
{{- end }}
