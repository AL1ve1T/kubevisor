apiVersion: v2
name: kubevisor
description: >-
  KubeVisor — turns OpenTelemetry traces and Kubernetes signals into a live
  service-communication graph. This chart installs the backend (graph API +
  OTLP/HTTP ingestion), its PostgreSQL store, the Kubernetes RBAC it needs to
  read pod status, and an optional OpenTelemetry Collector that feeds it.
type: application

# Chart version — bump on any change to the chart itself.
version: 0.1.0

# Version of the KubeVisor backend this chart deploys by default
# (overridable via backend.image.tag).
appVersion: "0.1.0"

keywords:
  - observability
  - opentelemetry
  - kubernetes
  - topology
  - tracing

home: https://github.com/al1ve1t/kubevisor
sources:
  - https://github.com/al1ve1t/kubevisor

maintainers:
  - name: KubeVisor
