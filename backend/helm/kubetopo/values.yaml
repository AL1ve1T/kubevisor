# =============================================================================
# KubeTopo Helm values
#
# Every tunable below maps to a real field in the rendered manifests. Override
# with `--set key=value` or your own `-f my-values.yaml`. The defaults reproduce
# the in-repo `backend/k8s/` manifests (a single-replica Minikube-friendly stack)
# and are safe for local/demo use — see the "auth" and "persistence" notes
# before any non-local deployment.
# =============================================================================

# -- Override the chart name (used to build resource names). Defaults to "kubetopo".
nameOverride: ""
# -- Fully override the generated resource-name prefix. Defaults to the release name.
fullnameOverride: "kubetopo"

# -- Image pull secrets applied to every pod (for private registries).
imagePullSecrets: []
# - name: my-registry-secret

# -----------------------------------------------------------------------------
# Namespace — all KubeTopo resources are placed in this namespace.
# -----------------------------------------------------------------------------
namespace:
  # -- Target namespace for every resource. Empty falls back to the Helm release
  #    namespace (`--namespace`).
  name: kubetopo
  # -- Create the namespace as part of the release. When installing with
  #    `helm install ... -n <name> --create-namespace`, set this to false to let
  #    the Helm CLI own the namespace and avoid an "already exists" conflict.
  create: true

# -----------------------------------------------------------------------------
# Backend — graph API (REST + SSE) on apiPort, OTLP/HTTP ingestion on otlpPort.
# -----------------------------------------------------------------------------
backend:
  replicaCount: 1

  image:
    repository: kubetopo-backend
    # -- Image tag. Empty string falls back to Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent

  # Ports.
  api:
    # -- Graph API / management port (Spring `server.port`). Consumed by the frontend.
    port: 8080
  otlp:
    # -- Dedicated OTLP/HTTP ingestion port (`kubetopo.otlp.http-port`). The
    #    standard OTLP/HTTP port, so any collector can export here. Set equal to
    #    api.port (or 0) to serve ingestion on the main port only.
    httpPort: 4318

  service:
    type: ClusterIP
    # -- Service port exposing the graph API.
    apiPort: 8080
    # -- Service port exposing OTLP/HTTP ingestion.
    otlpPort: 4318

  # Spring profile activated in-cluster (selects the PostgreSQL datasource).
  springProfile: k8s

  # -- Age (seconds) after which idle nodes/edges are removed
  #    (`KUBETOPO_STALE_THRESHOLD_SECONDS`).
  staleThresholdSeconds: 120

  # -- Extra environment variables for advanced `kubetopo.*` tuning, e.g.
  #    KUBETOPO_MEMORY_LIMIT_BYTES, KUBETOPO_CPU_HIGH_THRESHOLD,
  #    KUBETOPO_RESOURCE_METRIC_STALE_SECONDS, KUBETOPO_TRAFFIC_HOLD_SECONDS.
  extraEnv: []
  # - name: KUBETOPO_MEMORY_LIMIT_BYTES
  #   value: "536870912"

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podAnnotations: {}

# -----------------------------------------------------------------------------
# Frontend — the React/Vite topology UI, served by nginx. nginx reverse-proxies
# /api (REST + SSE) to the backend, so the SPA talks to the backend same-origin.
# -----------------------------------------------------------------------------
frontend:
  # -- Deploy the frontend UI.
  enabled: true
  replicaCount: 1

  image:
    repository: kubetopo-frontend
    # -- Image tag. Empty string falls back to Chart.appVersion.
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    # -- Service port the UI is exposed on.
    port: 80

  # -- Backend base URL the nginx sidecar proxies /api to. Empty defaults to the
  #    in-cluster backend Service FQDN on backend.service.apiPort. Must be a
  #    fully-qualified host (nginx resolves it at request time and does not apply
  #    cluster DNS search domains).
  backendUrl: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  podAnnotations: {}

# -----------------------------------------------------------------------------
# RBAC — the backend lists pods (pod status / restart counts) cluster-wide.
# -----------------------------------------------------------------------------
serviceAccount:
  # -- Create a ServiceAccount for the backend.
  create: true
  # -- Name to use; generated from the release name when empty.
  name: ""
  annotations: {}

rbac:
  # -- Create the ClusterRole + ClusterRoleBinding granting `pods: list`.
  create: true

# -----------------------------------------------------------------------------
# Bundled PostgreSQL (24h+ snapshot history). Disable to use an external DB.
# -----------------------------------------------------------------------------
postgres:
  # -- Deploy the bundled PostgreSQL. Set false to use `externalDatabase`.
  enabled: true

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  auth:
    database: kubetopo
    username: kubetopo
    # -- Demo-only password. Replace before any non-local deployment, or set
    #    `existingSecret` to manage credentials externally.
    password: changeme-local-dev
    # -- Use an existing Secret (keys POSTGRES_USER / POSTGRES_PASSWORD /
    #    POSTGRES_DB) instead of the chart-managed one.
    existingSecret: ""

  persistence:
    # -- Use a PersistentVolumeClaim. False uses an emptyDir (data lost on restart).
    enabled: true
    size: 2Gi
    # -- StorageClass; empty uses the cluster default.
    storageClass: ""

  service:
    port: 5432

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -----------------------------------------------------------------------------
# External database — used only when `postgres.enabled: false`.
# -----------------------------------------------------------------------------
externalDatabase:
  host: ""
  port: 5432
  database: kubetopo
  # -- Secret holding the DB credentials.
  existingSecret: ""
  userKey: POSTGRES_USER
  passwordKey: POSTGRES_PASSWORD

# -----------------------------------------------------------------------------
# OpenTelemetry Collector — feeds the backend. Disable if your cluster already
# runs a collector; point that collector at the backend's OTLP service
# (<release>-backend:4318). Bundled here so the install is turnkey.
# -----------------------------------------------------------------------------
otelCollector:
  enabled: true

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.98.0"
    pullPolicy: IfNotPresent

  # -- Where the collector exports telemetry. Empty defaults to the in-cluster
  #    backend OTLP service on backend.service.otlpPort.
  backendEndpoint: ""

  kubeletStats:
    # -- Scrape per-pod/container CPU & memory from the kubelet (needs node access).
    #    Disable on clusters where the kubelet stats API is unavailable.
    enabled: true
    # -- Scrape interval.
    collectionInterval: 15s

  service:
    grpcPort: 4317
    httpPort: 4318

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Beyla — passive eBPF network-flow capture (DaemonSet). Produces topology edges
# for workloads that have NO OpenTelemetry instrumentation. Disabled by default:
# it requires a privileged, host-network/host-PID DaemonSet, so enable it
# deliberately. When enabled you can pin it to specific nodes via nodeSelector /
# tolerations / affinity.
# -----------------------------------------------------------------------------
beyla:
  enabled: false

  image:
    repository: grafana/beyla
    tag: "latest"
    pullPolicy: IfNotPresent

  # -- OTLP endpoint Beyla exports network-flow metrics to. Empty defaults to the
  #    bundled collector's OTLP/HTTP service (needs otelCollector.enabled); set it
  #    to your own collector or directly to <release>-backend:4318 otherwise.
  otlpEndpoint: ""

  # Beyla eBPF settings — keep these passive (see backend/docs/deployment.md).
  network:
    source: socket_filter
  contextPropagation: disabled

  # -- Optional: scope Beyla's application-level instrumentation to specific
  #    namespaces + open ports. Empty by default — passive network-flow capture
  #    already observes all node traffic regardless. Add entries only to target
  #    your own workloads, e.g. [{namespace: my-ns, openPorts: "8080,5432"}].
  discovery: []

  # Node scheduling — restrict the DaemonSet to chosen nodes.
  nodeSelector: {}
  tolerations: []
  affinity: {}

  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
