{{- if .Values.frontend.enabled }}
{{- $backendUrl := .Values.frontend.backendUrl | default (printf "http://%s.%s.svc.cluster.local:%v" (include "kubetopo.backend.fullname" .) (include "kubetopo.namespace" .) .Values.backend.service.apiPort) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubetopo.frontend.fullname" . }}
  namespace: {{ include "kubetopo.namespace" . }}
  labels:
    app: {{ include "kubetopo.frontend.fullname" . }}
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
    {{- include "kubetopo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "kubetopo.frontend.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "kubetopo.frontend.fullname" . }}
        app.kubernetes.io/name: {{ include "kubetopo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: frontend
      {{- with .Values.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "kubetopo.frontend.image" . | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            # nginx reverse-proxies /api (REST + SSE) to this backend URL.
            - name: BACKEND_URL
              value: {{ $backendUrl | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubetopo.frontend.fullname" . }}
  namespace: {{ include "kubetopo.namespace" . }}
  labels:
    app: {{ include "kubetopo.frontend.fullname" . }}
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
    {{- include "kubetopo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: {{ include "kubetopo.frontend.fullname" . }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
{{- end }}
