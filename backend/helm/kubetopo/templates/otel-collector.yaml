{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kubetopo.collector.fullname" . }}
  namespace: {{ include "kubetopo.namespace" . }}
  labels:
    app: {{ include "kubetopo.collector.fullname" . }}
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    {{- include "kubetopo.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubetopo.collector.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    {{- include "kubetopo.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes/stats", "nodes/proxy"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  # Required by the k8sattributes processor to resolve k8s.deployment.name.
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubetopo.collector.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    {{- include "kubetopo.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubetopo.collector.fullname" . }}
    namespace: {{ include "kubetopo.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubetopo.collector.fullname" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubetopo.collector.fullname" . }}
  namespace: {{ include "kubetopo.namespace" . }}
  labels:
    app: {{ include "kubetopo.collector.fullname" . }}
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    {{- include "kubetopo.labels" . | nindent 4 }}
data:
  otel-collector-config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.otelCollector.service.grpcPort }}
          http:
            endpoint: 0.0.0.0:{{ .Values.otelCollector.service.httpPort }}
      {{- if .Values.otelCollector.kubeletStats.enabled }}
      kubeletstats:
        collection_interval: {{ .Values.otelCollector.kubeletStats.collectionInterval }}
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metric_groups:
          - pod
          - container
        metrics:
          k8s.container.cpu_limit_utilization:
            enabled: true
          k8s.pod.cpu.utilization:
            enabled: true
      {{- end }}

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.replicaset.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name

    exporters:
      debug:
        verbosity: basic
      otlphttp/kubetopo_backend:
        endpoint: "${env:KUBETOPO_BACKEND_ENDPOINT}"
        encoding: json
        compression: none
        tls:
          insecure: true

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlphttp/kubetopo_backend]
        metrics:
          receivers: [otlp{{ if .Values.otelCollector.kubeletStats.enabled }}, kubeletstats{{ end }}]
          processors: [batch, k8sattributes]
          exporters: [debug, otlphttp/kubetopo_backend]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubetopo.collector.fullname" . }}
  namespace: {{ include "kubetopo.namespace" . }}
  labels:
    app: {{ include "kubetopo.collector.fullname" . }}
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    {{- include "kubetopo.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "kubetopo.collector.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "kubetopo.collector.fullname" . }}
        app.kubernetes.io/name: {{ include "kubetopo.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: otel-collector
    spec:
      serviceAccountName: {{ include "kubetopo.collector.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}
          args:
            - --config=/etc/otel/otel-collector-config.yaml
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: KUBETOPO_BACKEND_ENDPOINT
              value: {{ include "kubetopo.collector.backendEndpoint" . | quote }}
          ports:
            - containerPort: {{ .Values.otelCollector.service.grpcPort }}
              name: otlp-grpc
            - containerPort: {{ .Values.otelCollector.service.httpPort }}
              name: otlp-http
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: {{ include "kubetopo.collector.fullname" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubetopo.collector.fullname" . }}
  namespace: {{ include "kubetopo.namespace" . }}
  labels:
    app: {{ include "kubetopo.collector.fullname" . }}
    app.kubernetes.io/name: {{ include "kubetopo.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
    {{- include "kubetopo.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "kubetopo.collector.fullname" . }}
  ports:
    - port: {{ .Values.otelCollector.service.grpcPort }}
      targetPort: {{ .Values.otelCollector.service.grpcPort }}
      protocol: TCP
      name: otlp-grpc
    - port: {{ .Values.otelCollector.service.httpPort }}
      targetPort: {{ .Values.otelCollector.service.httpPort }}
      protocol: TCP
      name: otlp-http
{{- end }}
