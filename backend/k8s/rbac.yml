apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubevizor-backend
  namespace: kubevizor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubevizor-backend-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevizor-backend-pod-reader
subjects:
  - kind: ServiceAccount
    name: kubevizor-backend
    namespace: kubevizor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubevizor-backend-pod-reader
