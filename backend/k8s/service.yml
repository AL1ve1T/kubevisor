apiVersion: v1
kind: Service
metadata:
  name: kubevisor-backend
  namespace: kubevisor
  labels:
    app: kubevisor-backend
spec:
  type: ClusterIP
  selector:
    app: kubevisor-backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 4318
      targetPort: 4318
      protocol: TCP
      name: otlp-http
