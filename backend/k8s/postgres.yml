apiVersion: v1
kind: Secret
metadata:
  name: kubetopo-postgres-secret
  namespace: kubetopo
type: Opaque
stringData:
  POSTGRES_DB: kubetopo
  POSTGRES_USER: kubetopo
  # Demo-only password for local Minikube. Replace with a real, externally-managed
  # Secret (e.g. sealed-secrets / external-secrets) before any non-local deployment.
  POSTGRES_PASSWORD: changeme-local-dev
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubetopo-postgres-pvc
  namespace: kubetopo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubetopo-postgres
  namespace: kubetopo
  labels:
    app: kubetopo-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubetopo-postgres
  template:
    metadata:
      labels:
        app: kubetopo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: kubetopo-postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kubetopo", "-d", "kubetopo"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "kubetopo", "-d", "kubetopo"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kubetopo-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kubetopo-postgres
  namespace: kubetopo
  labels:
    app: kubetopo-postgres
spec:
  type: ClusterIP
  selector:
    app: kubetopo-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
