apiVersion: v1
kind: Secret
metadata:
  name: kubevisor-postgres-secret
  namespace: kubevisor
type: Opaque
stringData:
  POSTGRES_DB: kubevisor
  POSTGRES_USER: kubevisor
  POSTGRES_PASSWORD: kubevisor-secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubevisor-postgres-pvc
  namespace: kubevisor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubevisor-postgres
  namespace: kubevisor
  labels:
    app: kubevisor-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubevisor-postgres
  template:
    metadata:
      labels:
        app: kubevisor-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: kubevisor-postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kubevisor", "-d", "kubevisor"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "kubevisor", "-d", "kubevisor"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kubevisor-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kubevisor-postgres
  namespace: kubevisor
  labels:
    app: kubevisor-postgres
spec:
  type: ClusterIP
  selector:
    app: kubevisor-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
