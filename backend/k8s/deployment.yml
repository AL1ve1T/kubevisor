apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubetopo-backend
  namespace: kubetopo
  labels:
    app: kubetopo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubetopo-backend
  template:
    metadata:
      labels:
        app: kubetopo-backend
    spec:
      serviceAccountName: kubetopo-backend
      containers:
        - name: kubetopo-backend
          image: kubetopo-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 4318
              name: otlp-http
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: KUBETOPO_OTLP_HTTP_PORT
              value: "4318"
            - name: KUBETOPO_STALE_THRESHOLD_SECONDS
              value: "120"
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: DB_HOST
              value: "kubetopo-postgres"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kubetopo-postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kubetopo-postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
