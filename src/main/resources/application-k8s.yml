# Profile activated in Kubernetes via SPRING_PROFILES_ACTIVE=k8s.
# Overrides the default H2 datasource with PostgreSQL.
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:kubeflow-postgres}:${DB_PORT:5432}/${DB_NAME:kubeflow}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: false
