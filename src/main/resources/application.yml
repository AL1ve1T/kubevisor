server:
  port: 8080

spring:
  application:
    name: kubeflow-backend
  datasource:
    url: jdbc:h2:file:./data/kubeflow;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

kubeflow:
  stale-threshold-seconds: 120
  cleanup-interval-seconds: 30
  retention-hours: 24
  # CPU utilization thresholds (0.0 – 1.0) for node load classification
  cpu-elevated-threshold: 0.50
  cpu-high-threshold: 0.70
  cpu-critical-threshold: 0.85
  # Memory utilization thresholds (0.0 – 1.0) for node load classification
  mem-elevated-threshold: 0.60
  mem-high-threshold: 0.75
  mem-critical-threshold: 0.90
  # Memory limit per container in bytes used to convert container.memory.working_set
  # (raw bytes from kubeletstats) to a [0,1] utilization ratio. Set this to match the
  # memory limit configured for your workload pods (default: 512 MiB).
  memory-limit-bytes: 536870912
  # How often to scrape pod status from the Kubernetes API (seconds).
  # Local dev: uses 'kubectl get pods' subprocess (inherits active kubeconfig context).
  # In-cluster: calls the Kubernetes API directly via ServiceAccount bearer token.
  pod-status-scrape-interval-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.kubeflow: INFO
