server:
  port: 8080

spring:
  application:
    name: kubeflow-backend
  datasource:
    # H2 in PostgreSQL compatibility mode so Flyway migration SQL runs without changes locally.
    url: jdbc:h2:file:./data/kubeflow;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      # Flyway owns the schema — Hibernate must not attempt to validate or alter it.
      # ddl-auto: validate is kept in application-k8s.yml for the real PostgreSQL deployment.
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console

kubeflow:
  stale-threshold-seconds: 600
  cleanup-interval-seconds: 30
  retention-days: 30
  # CPU utilization thresholds (0.0 – 1.0) for node load classification
  cpu-elevated-threshold: 0.50
  cpu-high-threshold: 0.70
  cpu-critical-threshold: 0.85
  # Memory utilization thresholds (0.0 – 1.0) for node load classification
  mem-elevated-threshold: 0.60
  mem-high-threshold: 0.75
  mem-critical-threshold: 0.90
  # Memory limit per container in bytes used to convert container.memory.working_set
  # (raw bytes from kubeletstats) to a [0,1] utilization ratio. Set this to match the
  # memory limit configured for your workload pods (default: 512 MiB).
  memory-limit-bytes: 536870912
  # How often to scrape pod status from the Kubernetes API (seconds).
  # Local dev: uses 'kubectl get pods' subprocess (inherits active kubeconfig context).
  # In-cluster: calls the Kubernetes API directly via ServiceAccount bearer token.
  pod-status-scrape-interval-seconds: 15
  # How often to persist graph snapshots for the history API (milliseconds).
  # This runs even without new telemetry so edge-window decay is sampled continuously.
  snapshot-persist-interval-millis: 1000
  # How long CPU/memory samples remain valid without a fresh kubeletstats update.
  # After this window, node utilization and edge loadLevel fall back to calm values.
  resource-metric-stale-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.kubeflow: INFO
