server:
  port: 8080

spring:
  application:
    name: kubeflow-backend
  datasource:
    url: jdbc:h2:file:./data/kubeflow;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

kubeflow:
  stale-threshold-seconds: 120
  cleanup-interval-seconds: 30
  retention-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.kubeflow: INFO
